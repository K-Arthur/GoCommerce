services:
  # Databases
  productdb:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Your_password123
    ports:
      - "1433:1433"
    networks:
      - gocommerce-net

  customerdb:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Your_password123
    ports:
      - "1434:1433"
    networks:
      - gocommerce-net

  orderdb:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Your_password123
    ports:
      - "1435:1433"
    networks:
      - gocommerce-net

  shippingdb:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Your_password123
    ports:
      - "1436:1433"
    networks:
      - gocommerce-net

  # Message Broker
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    networks:
      - gocommerce-net

  # Microservices
  productservice:
    build:
      context: src/ProductService
      dockerfile: Dockerfile
    ports:
      - "5001:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=productdb;Database=ProductDb;User Id=sa;Password=Your_password123;TrustServerCertificate=True;
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__UserName=guest
      - RabbitMQ__Password=guest
    depends_on:
      - productdb
      - rabbitmq
    networks:
      - gocommerce-net

  customerservice:
    build:
      context: src/CustomerService
      dockerfile: Dockerfile
    ports:
      - "5002:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=customerdb;Database=CustomerDb;User Id=sa;Password=Your_password123;TrustServerCertificate=True;
    depends_on:
      - customerdb
    networks:
      - gocommerce-net

  orderservice:
    build:
      context: src/OrderService
      dockerfile: Dockerfile
    ports:
      - "5003:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=orderdb;Database=OrderDb;User Id=sa;Password=Your_password123;TrustServerCertificate=True;
      - ServiceUrls__CustomerService=http://customerservice:8080
      - ServiceUrls__ProductService=http://productservice:8080
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__UserName=guest
      - RabbitMQ__Password=guest
    depends_on:
      - orderdb
      - customerservice
      - productservice
      - rabbitmq
    networks:
      - gocommerce-net

  shippingservice:
    build:
      context: src/ShippingService
      dockerfile: Dockerfile
    ports:
      - "5004:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=shippingdb;Database=ShippingDb;User Id=sa;Password=Your_password123;TrustServerCertificate=True;
      - ServiceUrls__OrderService=http://orderservice:8080
    depends_on:
      - shippingdb
      - orderservice
    networks:
      - gocommerce-net

networks:
  gocommerce-net:
    driver: bridge
